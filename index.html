<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Constellation of Brunettes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e8dcc8;
  }

  .sky {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(90, 40, 120, 0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(40, 30, 90, 0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(20, 15, 40, 0.8) 0%, #000 85%);
    z-index: 0;
  }

  .smoke {
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(ellipse 600px 400px at 20% 30%, rgba(180, 160, 200, 0.1), transparent 60%),
      radial-gradient(ellipse 500px 300px at 80% 60%, rgba(140, 120, 180, 0.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 50% 90%, rgba(100, 80, 140, 0.09), transparent 60%);
    filter: blur(40px);
    animation: smokeDrift 40s ease-in-out infinite alternate;
    z-index: 1;
    pointer-events: none;
  }

  /* second smoke layer moving the other direction for depth */
  .smoke2 {
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(ellipse 400px 300px at 60% 40%, rgba(200, 170, 230, 0.06), transparent 60%),
      radial-gradient(ellipse 600px 400px at 30% 70%, rgba(160, 130, 200, 0.05), transparent 60%);
    filter: blur(50px);
    animation: smokeDrift2 55s ease-in-out infinite alternate;
    z-index: 1;
    pointer-events: none;
  }

  /* rolling fog clouds — bigger, moodier, drifting horizontally */
  .fog {
    position: fixed;
    inset: -30%;
    pointer-events: none;
    z-index: 4;
    opacity: 0.7;
  }

  .fog-layer {
    position: absolute;
    inset: 0;
    background-repeat: repeat;
    mix-blend-mode: screen;
  }

  .fog-layer.a {
    background:
      radial-gradient(ellipse 800px 300px at 20% 40%, rgba(180, 160, 210, 0.18), transparent 70%),
      radial-gradient(ellipse 600px 250px at 70% 60%, rgba(150, 130, 190, 0.15), transparent 70%),
      radial-gradient(ellipse 900px 350px at 45% 80%, rgba(170, 140, 200, 0.13), transparent 70%);
    filter: blur(25px);
    animation: fogRollA 60s linear infinite;
  }

  .fog-layer.b {
    background:
      radial-gradient(ellipse 700px 280px at 80% 30%, rgba(200, 180, 230, 0.12), transparent 70%),
      radial-gradient(ellipse 1000px 400px at 30% 70%, rgba(130, 110, 170, 0.14), transparent 70%),
      radial-gradient(ellipse 500px 200px at 60% 50%, rgba(190, 160, 220, 0.1), transparent 70%);
    filter: blur(35px);
    animation: fogRollB 85s linear infinite;
  }

  .fog-layer.c {
    background:
      radial-gradient(ellipse 1200px 500px at 50% 50%, rgba(160, 140, 200, 0.08), transparent 70%),
      radial-gradient(ellipse 800px 350px at 20% 20%, rgba(180, 150, 210, 0.1), transparent 70%);
    filter: blur(45px);
    animation: fogRollC 110s linear infinite;
  }

  /* low-lying ground fog at the bottom */
  .ground-fog {
    position: fixed;
    left: -20%;
    right: -20%;
    bottom: -10%;
    height: 45%;
    background:
      radial-gradient(ellipse 60% 100% at 30% 100%, rgba(180, 160, 220, 0.25), transparent 70%),
      radial-gradient(ellipse 50% 90% at 70% 100%, rgba(140, 110, 180, 0.2), transparent 70%),
      radial-gradient(ellipse 80% 100% at 50% 100%, rgba(160, 130, 200, 0.18), transparent 70%);
    filter: blur(40px);
    animation: groundFogDrift 30s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: screen;
  }

  /* a subtle top haze so the frames feel like they're moving through atmosphere */
  .top-haze {
    position: fixed;
    left: -20%;
    right: -20%;
    top: -10%;
    height: 35%;
    background:
      radial-gradient(ellipse 70% 100% at 40% 0%, rgba(120, 90, 170, 0.15), transparent 70%),
      radial-gradient(ellipse 60% 90% at 75% 0%, rgba(160, 130, 200, 0.12), transparent 70%);
    filter: blur(45px);
    animation: groundFogDrift 40s ease-in-out infinite alternate-reverse;
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: screen;
  }

  @keyframes fogRollA {
    from { transform: translateX(0); }
    to   { transform: translateX(-25%); }
  }
  @keyframes fogRollB {
    from { transform: translateX(-15%); }
    to   { transform: translateX(20%); }
  }
  @keyframes fogRollC {
    from { transform: translateX(10%) translateY(0); }
    to   { transform: translateX(-15%) translateY(-5%); }
  }

  @keyframes groundFogDrift {
    0%   { transform: translateX(-3%) scaleX(1); opacity: 0.8; }
    50%  { transform: translateX(2%) scaleX(1.1); opacity: 1; }
    100% { transform: translateX(4%) scaleX(1.05); opacity: 0.9; }
  }

  @keyframes smokeDrift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-4%, 3%) scale(1.1); }
    100% { transform: translate(3%, -2%) scale(1.05); }
  }

  @keyframes smokeDrift2 {
    0%   { transform: translate(2%, -1%) scale(1.05); }
    50%  { transform: translate(-3%, 4%) scale(0.95); }
    100% { transform: translate(4%, 2%) scale(1.1); }
  }

  #stars {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* stage now covers the whole viewport — frames drift freely */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 5;
    perspective: 1000px;
  }

  .frame {
    position: absolute;
    width: 160px;
    height: 210px;
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(135deg, #2a1f3d 0%, #1a1030 100%);
    border: 1px solid rgba(200, 180, 220, 0.2);
    box-shadow:
      0 0 20px rgba(180, 150, 220, 0.2),
      0 0 60px rgba(120, 80, 180, 0.15),
      inset 0 0 20px rgba(0, 0, 0, 0.5);
    cursor: pointer;
    transition: box-shadow 0.3s ease;
    will-change: transform;
    backface-visibility: hidden;
    isolation: isolate;
  }

  .frame:hover {
    box-shadow:
      0 0 30px rgba(220, 190, 255, 0.4),
      0 0 80px rgba(160, 110, 220, 0.25),
      inset 0 0 20px rgba(0, 0, 0, 0.3);
  }

  /* soft glow halo on each frame that intensifies when filled */
  .frame::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 16px;
    background: radial-gradient(circle, rgba(180, 140, 220, 0.15), transparent 70%);
    pointer-events: none;
    z-index: -1;
    opacity: 0.6;
  }

  .frame.filled::before {
    opacity: 1;
    background: radial-gradient(circle, rgba(220, 180, 255, 0.25), transparent 70%);
  }

  .frame input[type="file"] {
    display: none;
  }

  .frame label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    color: rgba(220, 200, 240, 0.5);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    padding: 10px;
  }

  .frame label .plus {
    font-size: 28px;
    font-weight: 200;
    color: rgba(220, 200, 240, 0.4);
  }

  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    pointer-events: none;
  }

  .frame.filled img {
    display: block;
  }

  .frame.filled label {
    display: none;
  }

  .sparkle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    box-shadow:
      0 0 4px #fff,
      0 0 8px rgba(200, 180, 255, 0.8),
      0 0 12px rgba(180, 140, 220, 0.6);
    animation: twinkle 3s ease-in-out infinite;
    z-index: 3;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.5); }
    50%      { opacity: 1; transform: scale(1.2); }
  }

  .header {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .header h1 {
    font-weight: 200;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(230, 210, 250, 0.7);
    text-shadow: 0 0 10px rgba(180, 140, 220, 0.5);
  }

  .header p {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200, 180, 220, 0.4);
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
  }

  .controls button {
    background: rgba(30, 20, 50, 0.6);
    border: 1px solid rgba(200, 180, 220, 0.2);
    color: rgba(220, 200, 240, 0.8);
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
  }

  .controls button:hover {
    background: rgba(60, 40, 100, 0.6);
    border-color: rgba(220, 190, 255, 0.5);
    color: #fff;
  }

  /* cursor halo — a soft glow that follows the cursor and parts the fog */
  .cursor-halo {
    position: fixed;
    width: 300px;
    height: 300px;
    margin: -150px 0 0 -150px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    background: radial-gradient(circle,
      rgba(230, 200, 255, 0.18) 0%,
      rgba(180, 140, 220, 0.1) 30%,
      transparent 70%);
    mix-blend-mode: screen;
    transition: opacity 0.4s ease;
    opacity: 0;
    will-change: transform;
  }

  .cursor-halo.active {
    opacity: 1;
  }

  /* cursor trail sparkle — small and fast-fading */
  .trail-sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 7;
    box-shadow:
      0 0 6px #fff,
      0 0 12px rgba(220, 180, 255, 0.9),
      0 0 20px rgba(180, 140, 220, 0.7);
    animation: trailFade 1.2s ease-out forwards;
  }

  @keyframes trailFade {
    0%   { opacity: 1; transform: scale(1); }
    50%  { opacity: 0.8; transform: scale(1.4); }
    100% { opacity: 0; transform: scale(0.3) translateY(-20px); }
  }

  /* burst sparkles that fly outward from a clicked frame */
  .burst-sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    box-shadow:
      0 0 8px #fff,
      0 0 16px rgba(230, 190, 255, 1),
      0 0 28px rgba(190, 140, 230, 0.8);
    animation: burst 0.9s ease-out forwards;
  }

  @keyframes burst {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    60% {
      opacity: 1;
      transform: translate(var(--dx), var(--dy)) scale(1.3);
    }
    100% {
      opacity: 0;
      transform: translate(calc(var(--dx) * 1.3), calc(var(--dy) * 1.3)) scale(0.2);
    }
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="smoke"></div>
<div class="smoke2"></div>
<canvas id="stars"></canvas>

<div class="top-haze"></div>
<div class="ground-fog"></div>

<div class="fog">
  <div class="fog-layer a"></div>
  <div class="fog-layer b"></div>
  <div class="fog-layer c"></div>
</div>

<div class="header">
  <h1>Constellation of Brunettes</h1>
</div>

<div class="stage" id="stage"></div>

<div class="cursor-halo" id="cursorHalo"></div>

// ===== STARFIELD =====
const starCanvas = document.getElementById('stars');
const starCtx = starCanvas.getContext('2d');
let stars = [];

function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((starCanvas.width * starCanvas.height) / 4000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.4 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      hue: Math.random() < 0.15 ? (260 + Math.random() * 60) : null
    });
  }
}

function drawStars(t) {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    const alpha = 0.4 + Math.sin(t * s.twinkleSpeed + s.twinklePhase) * 0.4;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    if (s.hue !== null) {
      starCtx.fillStyle = `hsla(${s.hue}, 80%, 75%, ${alpha})`;
    } else {
      starCtx.fillStyle = `rgba(255, 245, 230, ${alpha})`;
    }
    starCtx.fill();
    if (s.r > 1) {
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      starCtx.fillStyle = `rgba(255, 230, 255, ${alpha * 0.15})`;
      starCtx.fill();
    }
  }
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', resizeStars);
resizeStars();
requestAnimationFrame(drawStars);

// ===== DRIFTING FRAMES =====
const FRAME_COUNT = 6;
const FRAME_W = 160;
const FRAME_H = 210;
const stage = document.getElementById('stage');
const frames = [];

function randVel() {
  // slow, drifty speeds — pixels per second
  const speed = 30 + Math.random() * 40;
  const angle = Math.random() * Math.PI * 2;
  return { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed };
}

for (let i = 0; i < FRAME_COUNT; i++) {
  const frame = document.createElement('div');
  frame.className = 'frame';
  frame.innerHTML = `
    <input type="file" accept="image/*" id="file-${i}">
    <label for="file-${i}">
      <span class="plus">+</span>
      <span>add image</span>
    </label>
    <img alt="">
  `;
  stage.appendChild(frame);

  // spread them out across the viewport at start
  const startX = (window.innerWidth - FRAME_W) * (0.1 + 0.8 * Math.random());
  const startY = (window.innerHeight - FRAME_H) * (0.1 + 0.8 * Math.random());
  const v = randVel();

  const state = {
    el: frame,
    x: startX,
    y: startY,
    vx: v.vx,
    vy: v.vy,
    rot: (Math.random() - 0.5) * 8, // small tilt
    rotVel: (Math.random() - 0.5) * 0.3, // slow rotation in deg/sec
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.5 + Math.random() * 0.5,
    spinStart: 0,       // timestamp when spin started (0 = not spinning)
    spinDuration: 800   // ms
  };
  frames.push(state);

  // file input wiring
  const input = frame.querySelector('input');
  const img = frame.querySelector('img');
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      img.src = ev.target.result;
      frame.classList.add('filled');
    };
    reader.readAsDataURL(file);
  });

  // double-click to clear individual
  frame.addEventListener('dblclick', () => {
    img.src = '';
    frame.classList.remove('filled');
    input.value = '';
  });

  // click: filled frames spin + burst sparkles; empty frames open file picker (default label behavior)
  frame.addEventListener('click', e => {
    if (!frame.classList.contains('filled')) return; // let the label/input do its thing
    e.preventDefault();
    // prevent hidden input click-through
    const cx = state.x + FRAME_W / 2;
    const cy = state.y + FRAME_H / 2;
    triggerSpin(state);
    burstSparkles(cx, cy);
  });

  // auto-fill from embedded images if available
  if (typeof EMBEDDED_IMAGES !== 'undefined' && EMBEDDED_IMAGES[i]) {
    img.src = EMBEDDED_IMAGES[i];
    frame.classList.add('filled');
  }
}

// trigger a click-spin on a frame
function triggerSpin(state) {
  state.spinStart = performance.now();
}

// burst N sparkles outward from a point
function burstSparkles(cx, cy) {
  const count = 16;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'burst-sparkle';
    // random angle, random distance
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 80 + Math.random() * 90;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.setProperty('--dx', dx + 'px');
    s.style.setProperty('--dy', dy + 'px');
    // slight size variation
    const size = 4 + Math.random() * 4;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

// ===== CURSOR TRACKING =====
const cursor = { x: -1000, y: -1000, active: false, lastTrailAt: 0 };
const cursorHalo = document.getElementById('cursorHalo');

window.addEventListener('mousemove', e => {
  cursor.x = e.clientX;
  cursor.y = e.clientY;
  if (!cursor.active) {
    cursor.active = true;
    cursorHalo.classList.add('active');
  }
  cursorHalo.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;

  // spawn trail sparkles (rate-limited)
  const now = performance.now();
  if (now - cursor.lastTrailAt > 40) {
    spawnTrailSparkle(e.clientX, e.clientY);
    cursor.lastTrailAt = now;
  }
});

window.addEventListener('mouseleave', () => {
  cursor.active = false;
  cursorHalo.classList.remove('active');
  cursor.x = -1000;
  cursor.y = -1000;
});

function spawnTrailSparkle(x, y) {
  const s = document.createElement('div');
  s.className = 'trail-sparkle';
  // jitter so the trail feels natural, not a straight line
  const jx = (Math.random() - 0.5) * 20;
  const jy = (Math.random() - 0.5) * 20;
  s.style.left = (x + jx) + 'px';
  s.style.top = (y + jy) + 'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1200);
}

// ===== PHYSICS LOOP =====
let lastT = performance.now();
let paused = false;

function tick(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05); // clamp to avoid huge jumps
  lastT = now;

  if (!paused) {
    const W = window.innerWidth;
    const H = window.innerHeight;

    // compute each frame's "depth score" — higher = in front
    // base score: vertical position (lower on screen = in front, like real depth)
    // bonus: proximity to cursor pulls a frame forward cleanly
    for (const f of frames) {
      const cx = f.x + FRAME_W / 2;
      const cy = f.y + FRAME_H / 2;
      let depth = cy; // lower y means further back, higher y means closer

      if (cursor.active) {
        const dx = cursor.x - cx;
        const dy = cursor.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 280) {
          depth += (280 - dist) * 3; // cursor-adjacent frames jump forward
        }
      }
      f._depth = depth;
    }

    // sort frames by depth and assign z-index (stable integer stacking)
    const sorted = [...frames].sort((a, b) => a._depth - b._depth);
    sorted.forEach((f, i) => {
      f.el.style.zIndex = 10 + i;
    });

    for (const f of frames) {
      const filled = f.el.classList.contains('filled');
      const cx = f.x + FRAME_W / 2;
      const cy = f.y + FRAME_H / 2;

      // cursor interaction (only for filled frames — empty slots stay passive)
      let tiltX = 0, tiltY = 0, scale = 1;
      if (filled && cursor.active) {
        const dx = cursor.x - cx;
        const dy = cursor.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const influenceRadius = 280;

        if (dist < influenceRadius) {
          const strength = 1 - (dist / influenceRadius); // 0..1

          // gentle attraction toward cursor (pulls them into its orbit)
          const attract = 40 * strength;
          f.vx += (dx / (dist || 1)) * attract * dt;
          f.vy += (dy / (dist || 1)) * attract * dt;

          // tilt toward cursor like a head turning to follow someone
          tiltX = (dy / influenceRadius) * 12 * strength;  // rotateX
          tiltY = -(dx / influenceRadius) * 12 * strength; // rotateY

          // scale up slightly when cursor is close
          scale = 1 + 0.12 * strength;
        }
      }

      // cap velocity so attraction doesn't make them scream around
      const maxSpeed = 120;
      const speed = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
      if (speed > maxSpeed) {
        f.vx = (f.vx / speed) * maxSpeed;
        f.vy = (f.vy / speed) * maxSpeed;
      }

      // gentle drag so they ease back to ambient drift when cursor leaves
      f.vx *= 0.995;
      f.vy *= 0.995;

      // maintain minimum speed so they never fully stop
      const minSpeed = 25;
      if (speed < minSpeed) {
        const boostAngle = Math.atan2(f.vy, f.vx) || Math.random() * Math.PI * 2;
        f.vx = Math.cos(boostAngle) * minSpeed;
        f.vy = Math.sin(boostAngle) * minSpeed;
      }

      // update position
      f.x += f.vx * dt;
      f.y += f.vy * dt;

      // bounce off edges with a bit of randomization
      if (f.x <= 0) {
        f.x = 0;
        f.vx = Math.abs(f.vx) + (Math.random() - 0.5) * 8;
        f.rotVel = (Math.random() - 0.5) * 0.4;
      } else if (f.x + FRAME_W >= W) {
        f.x = W - FRAME_W;
        f.vx = -Math.abs(f.vx) + (Math.random() - 0.5) * 8;
        f.rotVel = (Math.random() - 0.5) * 0.4;
      }
      if (f.y <= 0) {
        f.y = 0;
        f.vy = Math.abs(f.vy) + (Math.random() - 0.5) * 8;
        f.rotVel = (Math.random() - 0.5) * 0.4;
      } else if (f.y + FRAME_H >= H) {
        f.y = H - FRAME_H;
        f.vy = -Math.abs(f.vy) + (Math.random() - 0.5) * 8;
        f.rotVel = (Math.random() - 0.5) * 0.4;
      }

      // wobble rotation + drift
      f.rot += f.rotVel * dt * 10;
      f.wobblePhase += f.wobbleSpeed * dt;
      const wobble = Math.sin(f.wobblePhase) * 2;

      // click-spin: add 360deg of rotation eased over spinDuration ms
      let spinRot = 0;
      if (f.spinStart > 0) {
        const elapsed = now - f.spinStart;
        if (elapsed >= f.spinDuration) {
          f.spinStart = 0;
        } else {
          const t = elapsed / f.spinDuration;
          // ease-out cubic
          const eased = 1 - Math.pow(1 - t, 3);
          spinRot = eased * 360;
        }
      }

      f.el.style.transform =
        `translate(${f.x}px, ${f.y}px) ` +
        `rotate(${f.rot + wobble + spinRot}deg) ` +
        `rotateX(${tiltX}deg) rotateY(${tiltY}deg) ` +
        `scale(${scale})`;
    }
  }

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// on resize, keep frames in bounds
window.addEventListener('resize', () => {
  const W = window.innerWidth;
  const H = window.innerHeight;
  for (const f of frames) {
    f.x = Math.min(f.x, W - FRAME_W);
    f.y = Math.min(f.y, H - FRAME_H);
  }
});

// ===== SPARKLES =====
function spawnSparkle() {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 5000);
}
setInterval(spawnSparkle, 200);
for (let i = 0; i < 40; i++) spawnSparkle();

// ===== CONTROLS =====
// (pause/clear buttons removed — double-click a frame to clear it individually)
</script>

</body>
